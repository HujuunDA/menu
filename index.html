<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在线点单 - 烧烤店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f5f0e8;
            padding-bottom: 80px;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .header {
            background: linear-gradient(135deg, #d4451e, #b83a12);
            color: white;
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .category-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 12px 16px;
            background: white;
            position: sticky;
            top: 76px;
            z-index: 9;
            border-bottom: 1px solid #eee;
        }
        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            background: #f0ebe4;
            color: #5a3a2a;
            white-space: nowrap;
            cursor: pointer;
        }
        .cat-btn.active { background: #d4451e; color: white; }
        .cat-btn:active { transform: scale(0.96); }

        .menu-container { padding: 16px; }
        .category-section { margin-bottom: 24px; }
        .category-title {
            font-size: 18px;
            font-weight: 800;
            color: #3a2a1e;
            padding: 8px 0 12px 0;
            border-bottom: 2px solid #ffaa77;
            margin-bottom: 12px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        @media (max-width: 600px) {
            .item-grid { grid-template-columns: 1fr; }
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            gap: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .item-card:active { transform: scale(0.98); }

        .item-img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            background: #f0ebe4;
            flex-shrink: 0;
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 16px; color: #2c1a0e; }
        .item-price { color: #d4451e; font-weight: 700; font-size: 15px; margin-top: 4px; }
        .item-price::before { content: "¥ "; }

        .stepper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .btn-minus, .btn-plus {
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-minus { background: #f0ebe4; color: #5a3a2a; border: none; }
        .btn-plus { background: #d4451e; color: white; border: none; }
        .btn-minus:active, .btn-plus:active { transform: scale(0.92); }
        .item-count { font-weight: 700; font-size: 16px; min-width: 28px; text-align: center; }

        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 20, 12, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,170,80,0.5);
            z-index: 20;
        }
        .cart-info { color: white; }
        .cart-count { font-size: 14px; opacity: 0.8; }
        .cart-total { font-size: 20px; font-weight: 800; color: #ffaa66; }
        .btn-order {
            background: linear-gradient(135deg, #ff8c42, #e05a1a);
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-order:active { transform: scale(0.96); }

        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 99;
        }
        
        /* 紧凑版订单弹窗 */
        .order-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            width: 92%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            padding: 18px;
        }
        
        /* 紧凑的标题 */
        .order-dialog h3 { 
            font-size: 17px; 
            margin-bottom: 12px; 
            color: #2c1a0e; 
            border-left: 3px solid #d4451e; 
            padding-left: 10px;
        }
        
        /* 紧凑的客户信息区 */
        .customer-info-compact {
            margin-bottom: 12px;
        }
        .customer-info-compact input, 
        .customer-info-compact textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0d6cc;
            border-radius: 24px;
            font-size: 13px;
            margin-bottom: 8px;
            background: #fefcf8;
            font-family: inherit;
        }
        .customer-info-compact textarea {
            border-radius: 16px;
            resize: vertical;
            font-size: 12px;
        }
        .customer-info-compact input::placeholder,
        .customer-info-compact textarea::placeholder {
            color: #bbaa88;
            font-size: 12px;
        }
        
        /* 紧凑的订单预览 */
        .order-preview-compact {
            background: #f8f4ef;
            border-radius: 16px;
            padding: 10px 12px;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.45;
        }
        .order-line-compact {
            white-space: pre-wrap;
            word-break: break-all;
        }
        .order-title-compact {
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px dashed #d4c5b0;
        }
        .order-divider-compact {
            border-top: 1px dashed #e0d4c4;
            margin: 5px 0;
        }
        .order-item-row-compact {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            font-size: 11px;
        }
        .order-total-compact {
            font-weight: 700;
            font-size: 12px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #d4c5b0;
            display: flex;
            justify-content: space-between;
        }
        .order-remark-compact {
            background: #fff4e6;
            padding: 6px 8px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: #b86a2a;
            border-left: 2px solid #ffaa66;
        }
        .order-footer-compact {
            text-align: center;
            margin-top: 6px;
            font-size: 10px;
            color: #aa8866;
        }
        
        /* 紧凑的按钮组 */
        .dialog-btns-compact { 
            display: flex; 
            gap: 10px; 
            margin-top: 14px; 
        }
        .btn-copy-compact, .btn-share-compact, .btn-close-dialog-compact {
            flex: 1;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            font-size: 13px;
        }
        .btn-copy-compact { background: #2c6e2c; color: white; }
        .btn-share-compact { background: #1e88e5; color: white; }
        .btn-close-dialog-compact { background: #e8e0d6; color: #5a3a2a; }
        .btn-copy-compact:active, .btn-share-compact:active, .btn-close-dialog-compact:active { 
            transform: scale(0.96); 
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 烧烤部落</h1>
    <p>选好菜品，一键生成订单发给老板</p>
</div>

<div class="category-nav" id="categoryNav"></div>
<div class="menu-container" id="menuContainer"></div>

<div class="cart-bar">
    <div class="cart-info">
        <div class="cart-count">已选 <span id="cartCount">0</span> 件</div>
        <div class="cart-total">¥ <span id="cartTotal">0</span></div>
    </div>
    <button class="btn-order" onclick="showOrderDialog()">📋 生成订单</button>
</div>

<div class="modal-mask" id="modalMask" onclick="closeOrderDialog()"></div>

<!-- 紧凑版订单弹窗 -->
<div class="order-dialog" id="orderDialog">
    <h3>📝 填写信息</h3>
    
    <div class="customer-info-compact">
        <input type="text" id="customerName" placeholder="称呼（选填）">
        <textarea id="customerRemark" rows="2" placeholder="备注（辣度/忌口等）"></textarea>
    </div>
    
    <h3 style="margin-top: 0;">📋 订单预览</h3>
    <div class="order-preview-compact" id="orderTextPreview"></div>
    
    <div class="dialog-btns-compact">
        <div class="btn-copy-compact" onclick="copyOrder()">📋 复制</div>
        <div class="btn-share-compact" onclick="shareOrder()">📤 分享</div>
        <div class="btn-close-dialog-compact" onclick="closeOrderDialog()">关闭</div>
    </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
    // 默认菜单数据
    const DEFAULT_MENU = [
        { id: 1, name: "烤羊肉串", price: 5, category: "🔥 招牌烧烤", img: "https://picsum.photos/id/292/200/150" },
        { id: 2, name: "烤鸡翅", price: 8, category: "🔥 招牌烧烤", img: "https://picsum.photos/id/291/200/150" },
        { id: 3, name: "烤茄子", price: 12, category: "🔥 招牌烧烤", img: "https://picsum.photos/id/290/200/150" },
        { id: 4, name: "烤生蚝", price: 15, category: "🔥 招牌烧烤", img: "https://picsum.photos/id/288/200/150" },
        { id: 5, name: "拍黄瓜", price: 10, category: "🥗 凉菜小食", img: "https://picsum.photos/id/286/200/150" },
        { id: 6, name: "毛豆花生", price: 8, category: "🥗 凉菜小食", img: "https://picsum.photos/id/285/200/150" },
        { id: 7, name: "雪花啤酒", price: 8, category: "🍺 酒水饮料", img: "https://picsum.photos/id/283/200/150" },
        { id: 8, name: "可乐", price: 5, category: "🍺 酒水饮料", img: "https://picsum.photos/id/282/200/150" }
    ];

    let menuData = [];
    let cart = {};

    function loadMenu() {
        const stored = localStorage.getItem('restaurant_menu');
        if (stored) {
            menuData = JSON.parse(stored);
        } else {
            menuData = JSON.parse(JSON.stringify(DEFAULT_MENU));
            localStorage.setItem('restaurant_menu', JSON.stringify(menuData));
        }
    }

    function getCategories() {
        return [...new Set(menuData.map(item => item.category))];
    }

    function renderCategoryNav() {
        const categories = getCategories();
        const nav = document.getElementById('categoryNav');
        nav.innerHTML = categories.map(cat => 
            `<div class="cat-btn" onclick="scrollToCategory('${cat.replace(/'/g, "\\'")}')">${cat}</div>`
        ).join('');
    }

    function scrollToCategory(category) {
        const el = document.getElementById(`cat-${category.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '')}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderMenu() {
        const categories = getCategories();
        const container = document.getElementById('menuContainer');
        let html = '';
        categories.forEach(cat => {
            const catItems = menuData.filter(item => item.category === cat);
            const catId = `cat-${cat.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '')}`;
            html += `<div class="category-section" id="${catId}">
                        <div class="category-title">${cat}</div>
                        <div class="item-grid">`;
            catItems.forEach(item => {
                const count = cart[item.id] || 0;
                html += `
                    <div class="item-card">
                        <img class="item-img" src="${item.img}" alt="${item.name}" onerror="this.src='https://picsum.photos/id/1/200/150'">
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="item-price">${item.price}</div>
                            <div class="stepper">
                                <button class="btn-minus" onclick="event.stopPropagation(); changeCount(${item.id}, -1)">-</button>
                                <span class="item-count" id="count-${item.id}">${count}</span>
                                <button class="btn-plus" onclick="event.stopPropagation(); changeCount(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function changeCount(itemId, delta) {
        const newCount = (cart[itemId] || 0) + delta;
        if (newCount <= 0) {
            delete cart[itemId];
        } else {
            cart[itemId] = newCount;
        }
        const countSpan = document.getElementById(`count-${itemId}`);
        if (countSpan) countSpan.innerText = cart[itemId] || 0;
        updateCartUI();
        updateOrderPreview();
        if (navigator.vibrate) navigator.vibrate(20);
    }

    function updateCartUI() {
        let totalCount = 0, totalPrice = 0;
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            if (item) {
                totalCount += qty;
                totalPrice += item.price * qty;
            }
        }
        document.getElementById('cartCount').innerText = totalCount;
        document.getElementById('cartTotal').innerText = totalPrice;
    }

    // 生成紧凑版订单HTML
    function generateOrderHTML() {
        const name = document.getElementById('customerName').value.trim();
        const remark = document.getElementById('customerRemark').value.trim();
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        let itemsHtml = '';
        let total = 0;
        const itemList = [];
        
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            if (item && qty > 0) {
                const subtotal = item.price * qty;
                total += subtotal;
                itemList.push({ name: item.name, qty, price: item.price, subtotal });
            }
        }
        
        itemList.sort((a, b) => a.name.localeCompare(b.name));
        
        for (const item of itemList) {
            itemsHtml += `
                <div class="order-item-row-compact">
                    <span>${item.name} x${item.qty}</span>
                    <span>¥${item.subtotal}</span>
                </div>
            `;
        }
        
        let html = `
            <div class="order-line-compact">
                <div class="order-title-compact">🔥 烧烤部落</div>
        `;
        
        if (name) {
            html += `<div style="margin: 2px 0;">👤 ${escapeHtml(name)}</div>`;
        }
        html += `<div style="margin: 2px 0;">🕐 ${timeStr}</div>`;
        html += `<div class="order-divider-compact"></div>`;
        html += itemsHtml;
        html += `<div class="order-total-compact">
                    <span>💰 总计</span>
                    <span>¥${total}</span>
                 </div>`;
        
        if (remark) {
            html += `<div class="order-remark-compact">
                        📝 ${escapeHtml(remark)}
                     </div>`;
        }
        
        html += `<div class="order-footer-compact">请确认制作 🍢</div>`;
        html += `</div>`;
        
        return html;
    }
    
    // 生成纯文本订单
    function generatePlainOrderText() {
        const name = document.getElementById('customerName').value.trim();
        const remark = document.getElementById('customerRemark').value.trim();
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        let lines = [];
        lines.push("🔥 烧烤部落");
        lines.push("-".repeat(24));
        
        if (name) lines.push(`客户：${name}`);
        lines.push(`时间：${timeStr}`);
        lines.push("");
        
        let total = 0;
        const itemList = [];
        
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuData.find(i => i.id == id);
            if (item && qty > 0) {
                const subtotal = item.price * qty;
                total += subtotal;
                itemList.push({ name: item.name, qty, price: item.price, subtotal });
            }
        }
        
        itemList.sort((a, b) => a.name.localeCompare(b.name));
        
        for (const item of itemList) {
            lines.push(`${item.name} x${item.qty} = ¥${item.subtotal}`);
        }
        
        lines.push("");
        lines.push("-".repeat(24));
        lines.push(`总计：¥${total}`);
        
        if (remark) {
            lines.push(`备注：${remark}`);
        }
        
        lines.push("请确认制作 🍢");
        
        return lines.join("\n");
    }
    
    function updateOrderPreview() {
        const previewDiv = document.getElementById('orderTextPreview');
        if (previewDiv && document.getElementById('orderDialog').style.display === 'block') {
            previewDiv.innerHTML = generateOrderHTML();
        }
    }

    function showOrderDialog() {
        const totalCount = Object.values(cart).reduce((a,b) => a+b, 0);
        if (totalCount === 0) { 
            showToast("请先选择菜品"); 
            return; 
        }
        document.getElementById('orderTextPreview').innerHTML = generateOrderHTML();
        document.getElementById('modalMask').style.display = 'block';
        document.getElementById('orderDialog').style.display = 'block';
    }

    function closeOrderDialog() {
        document.getElementById('modalMask').style.display = 'none';
        document.getElementById('orderDialog').style.display = 'none';
    }

    function copyOrder() {
        const text = generatePlainOrderText();
        navigator.clipboard.writeText(text).then(() => showToast("✅ 订单已复制"));
    }

    function shareOrder() {
        const text = generatePlainOrderText();
        if (navigator.share) {
            navigator.share({ 
                title: '烧烤部落订单', 
                text: text,
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(text).then(() => showToast("已复制订单"));
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function bindEvents() {
        const nameInput = document.getElementById('customerName');
        const remarkInput = document.getElementById('customerRemark');
        if (nameInput) {
            nameInput.addEventListener('input', () => {
                if (document.getElementById('orderDialog').style.display === 'block') {
                    document.getElementById('orderTextPreview').innerHTML = generateOrderHTML();
                }
            });
        }
        if (remarkInput) {
            remarkInput.addEventListener('input', () => {
                if (document.getElementById('orderDialog').style.display === 'block') {
                    document.getElementById('orderTextPreview').innerHTML = generateOrderHTML();
                }
            });
        }
    }

    function init() {
        loadMenu();
        renderCategoryNav();
        renderMenu();
        updateCartUI();
        bindEvents();
    }

    init();
</script>
</body>
</html>
